meters:
- name: transaction_fee_local
  description: Percentage fee on each successful local/standard card or scheme transaction (mada, KNET, Benefit). Indicative ~2.75%; varies by country/method.
  unit: percent
  aggregation: sum
  dimensions:
  - merchant
  - country
  - method
- name: transaction_fee_international
  description: Percentage fee on international card transactions, plus FX on cross-currency. Indicative ~3.25%.
  unit: percent
  aggregation: sum
  dimensions:
  - merchant
  - country
  - method
- name: refund_volume
  description: Value refunded to customers, reducing net settlement; may carry refund handling per agreement.
  unit: currency
  aggregation: sum
  dimensions:
  - merchant
  - charge
- name: chargeback_volume
  description: Disputed/charged-back transactions, which may carry dispute fees per agreement.
  unit: currency
  aggregation: sum
  dimensions:
  - merchant
  - charge
- name: payout_settlement
  description: Net funds settled to the merchant bank account after fees.
  unit: currency
  aggregation: sum
  dimensions:
  - merchant
  - destination
principles:
- name: Visibility
  description: Reconcile per-transaction fees by country and payment method using the Charges, Refunds, and Payouts APIs and download exports.
- name: Allocation
  description: Tag charges with reference/metadata per storefront, brand, or business unit so processing fees map to internal cost centers.
- name: Optimization
  description: Route customers to lower-cost local schemes (mada, KNET, Benefit) where appropriate; minimize FX by charging in local currency; reduce chargebacks with 3D Secure.
- name: Accountability
  description: Assign an owner per merchant account; review effective take-rate and refund/chargeback ratios monthly against negotiated pricing.
