description: >-
  FinOps view of Tap Payments spend. Tap does not charge for API access; cost is
  incurred as a per-transaction processing fee on live payments, deducted from
  settlement. The fee is a percentage of each successful transaction and varies
  by country (KSA, UAE, Kuwait, Bahrain, Qatar, Oman, Egypt), payment method
  (mada, KNET, Benefit, Visa, Mastercard, Amex, Apple Pay, Google Pay), card
  origin (local vs international, with FX on cross-currency), and negotiated
  merchant terms. Refunds and chargebacks may carry their own handling, and
  payouts settle net of fees.
notes: >-
  Per-transaction rates are set per merchant at onboarding and are not reconciled
  here. Indicative regional figures are roughly 2.75% for local/standard cards and
  about 3.25% for international cards plus FX, drawn from public third-party
  comparisons rather than an official Tap rate card - verify against your Tap
  merchant agreement.
